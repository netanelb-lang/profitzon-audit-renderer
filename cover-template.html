<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#fff;-webkit-font-smoothing:antialiased}

  .cover{width:1000px;height:1414px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}

  /* Subtle geometric decorators */
  .geo1{position:absolute;top:-60px;right:-60px;width:300px;height:300px;border:2px solid rgba(245,166,35,.06);transform:rotate(45deg)}
  .geo2{position:absolute;bottom:200px;left:-40px;width:200px;height:200px;border:2px solid rgba(245,166,35,.04);transform:rotate(15deg)}

  /* Subtle dot pattern */
  .dot-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(0,0,0,.03) 1px,transparent 1px);background-size:30px 30px;z-index:0}

  /* Gold accent bar at top */
  .accent-bar{height:6px;background:linear-gradient(90deg,#f5a623,#f5a623 60%,#fde68a);flex-shrink:0}

  /* Product watermark */
  .product-watermark{position:absolute;right:-20px;bottom:140px;width:420px;opacity:.04;z-index:1}

  /* Top bar */
  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:48px 60px 0;position:relative;z-index:2}
  .logo-box img{height:52px;display:block}
  .conf-badge{background:#f8f9fa;color:#6b7280;padding:10px 24px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid #e5e7eb}

  /* Main content */
  .cover-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 60px;position:relative;z-index:2}
  .prepared{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:#f5a623;margin-bottom:24px}
  .brand-name{font-size:82px;font-weight:900;color:#1a1b1e;letter-spacing:-3px;line-height:1.05;margin-bottom:24px}
  .report-type{font-size:16px;font-weight:600;color:#6b7280;letter-spacing:2px;line-height:1.6;text-transform:uppercase}
  .gold-line{width:120px;height:5px;background:#f5a623;margin-top:40px;border-radius:3px}

  /* Footer */
  .cover-footer{padding:40px 60px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #e5e7eb;position:relative;z-index:2}
  .footer-left{font-size:14px;color:#6b7280}
  .footer-left strong{color:#f5a623;font-weight:700}
  .footer-right{font-size:12px;color:#9ca3af;text-align:right;line-height:1.6}
</style>
</head>
<body>
<div class="cover">
  <div class="accent-bar"></div>
  <div class="dot-grid"></div>
  <div class="geo1"></div><div class="geo2"></div>
  {{productImageWatermark}}

  <div class="top-bar">
    <div class="logo-box"><img src="{{logoBase64}}" alt="Profitzon"></div>
    <div class="conf-badge">Private &amp; Confidential</div>
  </div>

  <div class="cover-main">
    <div class="prepared">Prepared exclusively for</div>
    <div class="brand-name">{{brandName}}</div>
    <div class="report-type">Amazon Growth &amp; Brand Audit</div>
    <div class="gold-line"></div>
  </div>

  <div class="cover-footer">
    <div class="footer-left"><strong>Profitzon</strong> &middot; Capital-Backed Amazon Growth Partner</div>
    <div class="footer-right">{{reportDate}}<br>Report ID: {{reportId}}</div>
  </div>
</div>
</body>
</html>
