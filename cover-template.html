<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: #fff; -webkit-font-smoothing: antialiased; }

  .cover {
    width: 1000px; height: 1414px; background: #fff;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Top bar */
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 44px 60px 0; }
  .logo-box img { height: 48px; display: block; }
  .conf-badge { background: #1a1a2e; color: #fff; padding: 8px 20px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; }

  /* Main content */
  .cover-main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 60px; position: relative; z-index: 2; }
  .prepared { font-size: 13px; text-transform: uppercase; letter-spacing: 5px; color: #94a3b8; font-weight: 600; margin-bottom: 18px; }
  .brand-name { font-size: 82px; font-weight: 900; color: #1a1a2e; letter-spacing: -3px; line-height: 1.05; margin-bottom: 20px; }
  .report-type { font-size: 26px; font-weight: 300; color: #64748b; letter-spacing: 0.5px; line-height: 1.3; }
  .gold-line { width: 80px; height: 4px; background: #d4a54a; margin-top: 36px; border-radius: 2px; }

  /* Subtle geometric accent */
  .accent-circle { position: absolute; right: 60px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; border: 2px solid rgba(212,165,74,0.12); border-radius: 50%; z-index: 1; }
  .accent-circle-inner { position: absolute; right: 100px; top: 50%; transform: translateY(-50%); width: 220px; height: 220px; border: 1px solid rgba(212,165,74,0.08); border-radius: 50%; z-index: 1; }

  /* PROFITZON watermark */
  .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-35deg); font-size: 150px; font-weight: 900; color: rgba(212,165,74,0.035); letter-spacing: 20px; white-space: nowrap; z-index: 0; text-transform: uppercase; }

  /* Product image watermark */
  .product-watermark { position: absolute; right: -20px; bottom: 120px; width: 420px; opacity: 0.05; z-index: 1; }

  /* Footer */
  .cover-footer { padding: 36px 60px; display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #e5e7eb; }
  .footer-left { font-size: 13px; color: #94a3b8; }
  .footer-left strong { color: #d4a54a; font-weight: 700; }
  .footer-right { font-size: 11px; color: #cbd5e1; text-align: right; line-height: 1.6; }
</style>
</head>
<body>
<div class="cover">
  <div class="watermark">ProfitZon</div>
  <div class="accent-circle"></div>
  <div class="accent-circle-inner"></div>
  {{productImageWatermark}}

  <div class="top-bar">
    <div class="logo-box"><img src="{{logoBase64}}" alt="Profitzon"></div>
    <div class="conf-badge">Private &amp; Confidential</div>
  </div>

  <div class="cover-main">
    <div class="prepared">Prepared exclusively for</div>
    <div class="brand-name">{{brandName}}</div>
    <div class="report-type">Amazon Growth &amp; Brand Audit</div>
    <div class="gold-line"></div>
  </div>

  <div class="cover-footer">
    <div class="footer-left"><strong>Profitzon</strong> &middot; Capital-Backed Amazon Growth Partner</div>
    <div class="footer-right">{{reportDate}}<br>Report ID: {{reportId}}</div>
  </div>
</div>
</body>
</html>
