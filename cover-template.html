<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#ecedf1;-webkit-font-smoothing:antialiased}

  .cover{width:1000px;height:1414px;background:#ecedf1;position:relative;overflow:hidden;display:flex;flex-direction:column}

  /* Product watermark (faded wireframe on right) */
  .product-watermark{position:absolute;right:-30px;top:120px;width:480px;opacity:.07;z-index:0;filter:grayscale(1)}

  /* Subtle tech grid lines */
  .grid-lines{position:absolute;inset:0;z-index:0;opacity:.04}
  .grid-lines div{position:absolute;background:#666}
  .grid-lines .h{width:100%;height:1px}
  .grid-lines .v{width:1px;height:100%}

  /* Confidential badge */
  .conf-badge{display:inline-block;margin:52px 0 0 60px;padding:10px 24px;border:2px solid #2e7d32;border-radius:24px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#2e7d32;position:relative;z-index:2}

  /* Main content */
  .cover-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 60px;position:relative;z-index:2}
  .brand-title{font-size:72px;font-weight:900;color:#1a1a1a;letter-spacing:-2.5px;line-height:1.08;margin-bottom:28px;max-width:700px}
  .blue-line{width:100%;max-width:680px;height:6px;background:#1a2744;margin-bottom:28px;border-radius:1px}
  .subtitle{font-size:22px;color:#666;line-height:1.55;max-width:640px}

  /* Footer */
  .cover-footer{padding:48px 60px;position:relative;z-index:2}
  .cover-footer-text{font-size:14px;color:#888;line-height:1.6}
  .cover-footer-text strong{color:#1a1a1a;font-weight:600}

  @media print{body{background:#ecedf1}.cover{box-shadow:none}}
</style>
</head>
<body>
<div class="cover">
  <!-- Subtle grid lines -->
  <div class="grid-lines">
    <div class="h" style="top:25%"></div>
    <div class="h" style="top:50%"></div>
    <div class="h" style="top:75%"></div>
    <div class="v" style="left:33%"></div>
    <div class="v" style="left:66%"></div>
  </div>

  {{productImageWatermark}}

  <div class="conf-badge">Private &amp; Confidential</div>

  <div class="cover-main">
    <div class="brand-title">{{brandName}}: Amazon Control &amp; Growth Audit</div>
    <div class="blue-line"></div>
    <div class="subtitle">Uncovering operational leaks and unlocking top-line revenue for your top-performing ASINs.</div>
  </div>

  <div class="cover-footer">
    <div class="cover-footer-text">Prepared exclusively for <strong>{{brandName}}</strong> | <strong>ProfitZon</strong> | Report ID: {{reportId}}</div>
  </div>
</div>
</body>
</html>
