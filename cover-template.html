<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#1c1c1c;-webkit-font-smoothing:antialiased}

  .cover{width:1000px;height:1414px;background:#1c1c1c;position:relative;overflow:hidden;display:flex;flex-direction:column}

  /* Geometric decorators */
  .geo1{position:absolute;top:-60px;right:-60px;width:300px;height:300px;border:4px solid rgba(245,166,35,.08);transform:rotate(45deg)}
  .geo2{position:absolute;bottom:200px;left:-40px;width:200px;height:200px;border:4px solid rgba(245,166,35,.05);transform:rotate(15deg)}
  .geo3{position:absolute;top:35%;right:8%;width:150px;height:150px;border:4px solid rgba(74,222,128,.04);transform:rotate(60deg)}

  /* Pixel grid pattern */
  .pixel-grid{position:absolute;inset:0;background-image:
    linear-gradient(rgba(245,166,35,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,166,35,.02) 1px,transparent 1px);
  background-size:40px 40px;z-index:0}

  /* Corner accents */
  .corner-tl{position:absolute;top:30px;left:30px;width:60px;height:60px;border-top:4px solid #f5a623;border-left:4px solid #f5a623;z-index:2}
  .corner-br{position:absolute;bottom:30px;right:30px;width:60px;height:60px;border-bottom:4px solid #f5a623;border-right:4px solid #f5a623;z-index:2}

  /* Watermark */
  .watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-family:'Press Start 2P',monospace;font-size:80px;color:rgba(245,166,35,.02);letter-spacing:20px;white-space:nowrap;z-index:0;text-transform:uppercase}

  /* Product watermark */
  .product-watermark{position:absolute;right:-20px;bottom:140px;width:420px;opacity:.03;z-index:1}

  /* Top bar */
  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:48px 60px 0;position:relative;z-index:2}
  .logo-box img{height:52px;display:block}
  .conf-badge{font-family:'Press Start 2P',monospace;background:rgba(245,166,35,.06);color:#f5a623;padding:10px 24px;border-radius:4px;font-size:8px;letter-spacing:2px;text-transform:uppercase;border:2px solid rgba(245,166,35,.15)}

  /* Main content */
  .cover-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 60px;position:relative;z-index:2}
  .prepared{font-family:'Press Start 2P',monospace;font-size:10px;text-transform:uppercase;letter-spacing:4px;color:#f5a623;margin-bottom:24px}
  .brand-name{font-size:88px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1.05;margin-bottom:24px}
  .report-type{font-family:'Press Start 2P',monospace;font-size:14px;color:#737373;letter-spacing:2px;line-height:1.6;text-transform:uppercase}
  .gold-line{width:120px;height:6px;background:#f5a623;margin-top:40px}

  /* Decorative pixel blocks */
  .px-deco{position:absolute;z-index:1}
  .px-deco-1{right:60px;top:50%;transform:translateY(-50%);display:grid;grid-template-columns:repeat(4,16px);gap:4px;opacity:.06}
  .px-deco-1 div{width:16px;height:16px;background:#f5a623}

  /* Footer */
  .cover-footer{padding:40px 60px;display:flex;justify-content:space-between;align-items:flex-end;border-top:3px solid #333;position:relative;z-index:2}
  .footer-left{font-size:14px;color:#737373}
  .footer-left strong{color:#f5a623;font-weight:700}
  .footer-right{font-size:12px;color:#525252;text-align:right;line-height:1.6}
</style>
</head>
<body>
<div class="cover">
  <div class="pixel-grid"></div>
  <div class="geo1"></div><div class="geo2"></div><div class="geo3"></div>
  <div class="corner-tl"></div><div class="corner-br"></div>
  <div class="watermark">ProfitZon</div>
  {{productImageWatermark}}

  <!-- Decorative pixel blocks -->
  <div class="px-deco px-deco-1">
    <div></div><div></div><div></div><div></div>
    <div></div><div style="background:transparent"></div><div style="background:transparent"></div><div></div>
    <div></div><div style="background:transparent"></div><div style="background:transparent"></div><div></div>
    <div></div><div></div><div></div><div></div>
  </div>

  <div class="top-bar">
    <div class="logo-box"><img src="{{logoBase64}}" alt="Profitzon"></div>
    <div class="conf-badge">Private &amp; Confidential</div>
  </div>

  <div class="cover-main">
    <div class="prepared">Prepared exclusively for</div>
    <div class="brand-name">{{brandName}}</div>
    <div class="report-type">Amazon Growth &amp; Brand Audit</div>
    <div class="gold-line"></div>
  </div>

  <div class="cover-footer">
    <div class="footer-left"><strong>Profitzon</strong> &middot; Capital-Backed Amazon Growth Partner</div>
    <div class="footer-right">{{reportDate}}<br>Report ID: {{reportId}}</div>
  </div>
</div>
</body>
</html>
