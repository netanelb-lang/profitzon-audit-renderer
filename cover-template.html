<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#0a1628;-webkit-font-smoothing:antialiased}

  .cover{width:1000px;height:1414px;background:linear-gradient(160deg,#0a1628 0%,#132b4d 40%,#1e3a5f 100%);position:relative;overflow:hidden;display:flex;flex-direction:column}

  /* Glow accents */
  .glow1{position:absolute;top:-150px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(45,125,210,.12),transparent 70%);border-radius:50%}
  .glow2{position:absolute;bottom:-100px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(212,165,74,.08),transparent 70%);border-radius:50%}
  .glow3{position:absolute;top:40%;right:5%;width:300px;height:300px;background:radial-gradient(circle,rgba(69,183,209,.06),transparent 60%);border-radius:50%}

  /* Watermark */
  .watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:160px;font-weight:900;color:rgba(255,255,255,.015);letter-spacing:20px;white-space:nowrap;z-index:0;text-transform:uppercase}

  /* Product watermark */
  .product-watermark{position:absolute;right:-20px;bottom:140px;width:420px;opacity:.04;z-index:1}

  /* Top bar */
  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:48px 60px 0;position:relative;z-index:2}
  .logo-box img{height:52px;display:block}
  .conf-badge{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);padding:10px 24px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(255,255,255,.08)}

  /* Main content */
  .cover-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 60px;position:relative;z-index:2}
  .prepared{font-size:14px;text-transform:uppercase;letter-spacing:6px;color:#d4a54a;font-weight:700;margin-bottom:20px}
  .brand-name{font-size:88px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1.05;margin-bottom:24px}
  .report-type{font-size:28px;font-weight:300;color:#94a3b8;letter-spacing:.5px;line-height:1.3}
  .gold-line{width:80px;height:4px;background:linear-gradient(90deg,#d4a54a,#f5a623);margin-top:40px;border-radius:2px}

  /* Footer */
  .cover-footer{padding:40px 60px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(255,255,255,.06);position:relative;z-index:2}
  .footer-left{font-size:14px;color:#64748b}
  .footer-left strong{color:#d4a54a;font-weight:700}
  .footer-right{font-size:12px;color:#475569;text-align:right;line-height:1.6}
</style>
</head>
<body>
<div class="cover">
  <div class="glow1"></div><div class="glow2"></div><div class="glow3"></div>
  <div class="watermark">ProfitZon</div>
  {{productImageWatermark}}

  <div class="top-bar">
    <div class="logo-box"><img src="{{logoBase64}}" alt="Profitzon"></div>
    <div class="conf-badge">Private &amp; Confidential</div>
  </div>

  <div class="cover-main">
    <div class="prepared">Prepared exclusively for</div>
    <div class="brand-name">{{brandName}}</div>
    <div class="report-type">Amazon Growth &amp; Brand Audit</div>
    <div class="gold-line"></div>
  </div>

  <div class="cover-footer">
    <div class="footer-left"><strong>Profitzon</strong> &middot; Capital-Backed Amazon Growth Partner</div>
    <div class="footer-right">{{reportDate}}<br>Report ID: {{reportId}}</div>
  </div>
</div>
</body>
</html>
